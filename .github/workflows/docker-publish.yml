name: Build and Push Derper Docker Image

on:
  push:
    branches: [ master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: w0n9/derper_server

jobs:
  build-on-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions
        id: versions
        run: |
          source .upstream-version
          echo "tailscale=$TAILSCALE_VERSION" >> $GITHUB_OUTPUT
          echo "go=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "alpine=$ALPINE_VERSION" >> $GITHUB_OUTPUT
          echo "alpine_mm=$(echo $ALPINE_VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-amd64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
            ALPINE_MAJOR_MINOR=${{ steps.versions.outputs.alpine_mm }}
            TAILSCALE_VERSION=${{ steps.versions.outputs.tailscale }}

  build-on-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions
        id: versions
        run: |
          source .upstream-version
          echo "tailscale=$TAILSCALE_VERSION" >> $GITHUB_OUTPUT
          echo "go=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "alpine=$ALPINE_VERSION" >> $GITHUB_OUTPUT
          echo "alpine_mm=$(echo $ALPINE_VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
            ALPINE_MAJOR_MINOR=${{ steps.versions.outputs.alpine_mm }}
            TAILSCALE_VERSION=${{ steps.versions.outputs.tailscale }}

  create-manifest:
    needs: [ build-on-amd64, build-on-arm64 ]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Create multi-arch manifest
        run: |
          for TAG in ${{ steps.meta.outputs.tags }}; do
            docker manifest create "$TAG" \
              --amend "${TAG}-amd64" \
              --amend "${TAG}-arm64"
            docker manifest push "$TAG"
          done
